; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; -----------------------------------------------------------------------------
; Heltec Vision Master E213 (LCMEN2R13EFC1, heltec-eink-modules)
; -----------------------------------------------------------------------------
[env:vision-master-e213]
board = heltec_wifi_lora_32_V3
board_upload.use_1200bps_touch = true
build_flags = 
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D Vision_Master_E213
  -D BOARD_VISION_MASTER_E213
lib_deps = 
  todd-herbert/heltec-eink-modules
  me-no-dev/ESPAsyncWebServer
  me-no-dev/AsyncTCP

; -----------------------------------------------------------------------------
; Elecrow CrowPanel 2.13" (SSD1680Z / JD79661, ESP32-S3, GxEPD2)
; -----------------------------------------------------------------------------
[env:crowpanel-e213]
board = esp32-s3-devkitc-1
board_build.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
build_flags = 
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D BOARD_CROWPANEL_E213
  -D BOARD_HAS_PSRAM
lib_deps = 
  zinggjm/GxEPD2
  adafruit/Adafruit GFX Library
  adafruit/Adafruit BusIO
  me-no-dev/ESPAsyncWebServer
  me-no-dev/AsyncTCP